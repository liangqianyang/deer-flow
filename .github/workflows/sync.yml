name: Scheduled Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨执行
  workflow_dispatch:    # 允许手动触发

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史
          # 【关键修改】使用你刚才配置的私人令牌，代替默认的无权限机器人
          token: ${{ secrets.MY_PAT }}

      - name: Sync from Upstream
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git remote add upstream https://github.com/bytedance/deer-flow.git
          git fetch upstream
          
          git checkout main
          # 【关键修改】去掉 --ff-only，采用标准合并，允许保留你自己加的 sync.yml 文件
          git merge upstream/main -m "Auto-merge upstream changes" || (echo "检测到代码冲突，请手动解决" && exit 1)
          
          git push origin main
